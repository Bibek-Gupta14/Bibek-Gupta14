name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          user: Bibek-Gupta14

          template: classic
          base: header, activity, community

          plugin_languages: yes
          plugin_languages_limit: 8

          plugin_isocalendar: yes

          plugin_habits: yes

          plugin_achievements: yes

          plugin_lines: yes
